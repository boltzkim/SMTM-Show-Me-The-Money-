<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SMTM 대시보드</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">ShowMeTheMoney</p>
          <h1>시뮬레이션 대시보드</h1>
        </div>
        <div class="status-wrap">
          <span id="serverState" class="pill idle" title="현재 시뮬레이션 실행 상태입니다.">대기</span>
          <span id="lastTick" class="muted" title="마지막으로 처리한 시뮬레이션 캔들 시간입니다.">틱 없음</span>
        </div>
      </header>

      <section class="toolbar">
        <label class="field">
          <span title="실행할 시뮬레이션 설정 파일입니다.">설정</span>
          <select id="configSelect" title="실행할 시뮬레이션 설정을 선택합니다."></select>
        </label>
        <label class="field compact">
          <span title="시뮬레이션 한 틱을 처리한 뒤 다음 틱까지 기다리는 시간입니다.">시뮬레이션 간격(초)</span>
          <input id="tickDelay" title="값이 작을수록 시뮬레이션 진행이 빨라집니다." type="number" min="0" max="10" step="0.1" value="0.2" />
        </label>
        <label class="field compact">
          <span title="비트코인과 엑스알피 실시간 시세를 다시 가져오는 주기입니다.">시세 갱신(초)</span>
          <input id="marketInterval" title="Upbit 공개 시세 API를 호출하는 간격입니다." type="number" min="1" max="30" step="1" value="3" />
        </label>
        <div class="actions">
          <button id="startButton" class="primary" title="시뮬레이션과 실시간 시세 갱신을 시작합니다." type="button">시작</button>
          <button id="stopButton" title="시뮬레이션과 실시간 시세 갱신을 중지합니다." type="button" disabled>중지</button>
        </div>
      </section>

      <section class="metrics">
        <article class="metric">
          <span title="지금까지 처리한 시뮬레이션 데이터 개수입니다. 반복 실행 모드에서는 종료율이 아니라 누적 틱 수로 표시됩니다.">진행 상태</span>
          <strong id="progressValue">0틱</strong>
          <div class="meter"><i id="progressBar"></i></div>
        </article>
        <article class="metric">
          <span title="현금과 보유 코인을 현재 가격으로 평가한 총 자산입니다.">평가 자산</span>
          <strong id="assetValue">-</strong>
          <small id="initialValue">초기 자산 -</small>
        </article>
        <article class="metric">
          <span title="초기 자산 대비 현재 평가 자산의 변동률입니다.">누적 수익률</span>
          <strong id="returnValue">-</strong>
          <small id="drawdownValue">최대 낙폭 -</small>
        </article>
        <article class="metric">
          <span title="주문 접수와 체결 이벤트를 합산한 결과 수입니다.">주문/체결</span>
          <strong id="orderValue">0</strong>
          <small id="fillRejectValue">체결 0건, 거절 0건</small>
        </article>
      </section>

      <section class="market-grid">
        <article class="panel market-panel">
          <div class="panel-head">
            <h2 title="Upbit KRW-BTC 실시간 체결가 흐름입니다.">비트코인 실시간 차트</h2>
            <span id="btcMarketState" class="muted">대기 중</span>
          </div>
          <div class="market-summary">
            <div><span title="가장 최근에 조회된 체결 가격입니다.">현재가</span><strong id="btcPrice">-</strong></div>
            <div><span title="전일 종가 대비 가격 변동률입니다.">전일 대비</span><strong id="btcChange">-</strong></div>
            <div><span title="최근 시세 API 응답 시간입니다.">갱신</span><strong id="btcUpdated">-</strong></div>
          </div>
          <canvas id="btcChart" height="220"></canvas>
        </article>

        <article class="panel market-panel">
          <div class="panel-head">
            <h2 title="Upbit KRW-XRP 실시간 체결가 흐름입니다.">엑스알피(리플) 실시간 차트</h2>
            <span id="xrpMarketState" class="muted">대기 중</span>
          </div>
          <div class="market-summary">
            <div><span title="가장 최근에 조회된 체결 가격입니다.">현재가</span><strong id="xrpPrice">-</strong></div>
            <div><span title="전일 종가 대비 가격 변동률입니다.">전일 대비</span><strong id="xrpChange">-</strong></div>
            <div><span title="최근 시세 API 응답 시간입니다.">갱신</span><strong id="xrpUpdated">-</strong></div>
          </div>
          <canvas id="xrpChart" height="220"></canvas>
        </article>
      </section>

      <section class="grid">
        <article class="panel chart-panel">
          <div class="panel-head">
            <h2 title="시뮬레이션 계좌의 평가 자산 변화입니다.">시뮬레이션 자산 곡선</h2>
            <span id="runId" class="muted">실행 없음</span>
          </div>
          <canvas id="equityChart" height="280"></canvas>
        </article>

        <article class="panel side-panel">
          <div class="panel-head">
            <h2 title="현재 실행의 요약 결과입니다.">최근 실행 정보</h2>
            <a id="reportLink" href="#" target="_blank" rel="noreferrer">리포트</a>
          </div>
          <dl class="report-list">
            <div><dt title="처리한 시뮬레이션 캔들 수입니다.">틱</dt><dd id="tickCount">0</dd></div>
            <div><dt title="실행을 시작한 시간입니다.">시작</dt><dd id="startedAt">-</dd></div>
            <div><dt title="중지되거나 종료된 시간입니다.">종료</dt><dd id="endedAt">-</dd></div>
            <div><dt title="리포트 파일 경로 또는 메모리 보관 상태입니다.">리포트</dt><dd id="outputPath">-</dd></div>
          </dl>
        </article>
      </section>

      <section class="tables">
        <article class="panel">
          <div class="panel-head">
            <h2 title="시뮬레이션에서 실제로 체결된 주문 내역입니다.">체결 내역</h2>
            <span id="fillCount" class="muted">0</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>시간</th>
                  <th>방향</th>
                  <th>가격</th>
                  <th>수량</th>
                  <th>수수료</th>
                </tr>
              </thead>
              <tbody id="fillsBody"></tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2 title="엔진 상태, 시장 데이터, 주문 요청, 체결, 리스크 거절 이벤트입니다.">이벤트 흐름</h2>
            <span id="eventCount" class="muted">0</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>시간</th>
                  <th>종류</th>
                  <th>내용</th>
                </tr>
              </thead>
              <tbody id="eventsBody"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
